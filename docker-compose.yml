services:
  db:
    image: postgres:16-alpine
    container_name: rumihat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rumihat}
      POSTGRES_USER: ${POSTGRES_USER:-rumihat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - rumihat-postgres-data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  rumihat-postgres-data:
