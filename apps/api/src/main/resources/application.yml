server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
      - optional:file:apps/api/.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rumihat}
    username: ${DATABASE_USERNAME:rumihat}
    password: ${DATABASE_PASSWORD:ncpebs13!}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:change-me}
            scope:
              - openid
              - profile
              - email
            redirect-uri: ${OAUTH_REDIRECT_BASE_URL:http://localhost:8080}/login/oauth2/code/google
          kakao:
            client-id: ${KAKAO_OAUTH_CLIENT_ID:change-me}
            client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:change-me}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH_REDIRECT_BASE_URL:http://localhost:8080}/login/oauth2/code/kakao
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

app:
  admin:
    email: ${ADMIN_EMAIL:admin@rumihat.local}
    password: ${ADMIN_PASSWORD:change-me}
  frontend:
    auth-success-url: ${FRONTEND_AUTH_SUCCESS_URL:http://localhost:3000/login}
    auth-failure-url: ${FRONTEND_AUTH_FAILURE_URL:http://localhost:3000/login?oauth=failed}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
